name: Refresh VSS token on Vercel

on:
  schedule:
    # Every 12 hours; script skips if Vercel token was updated within ~22h (23h TTL).
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  refresh-vss-token:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh and push VSS token to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: prj_oUYvyVocuSXZvf7mJNwKS0SfVHPX
          VERCEL_ORG_ID: team_BCwm33JWRA4Msul9mvRlK2eD
          VSS_BASE_URL: ${{ secrets.VSS_BASE_URL }}
          VSS_USERNAME: ${{ secrets.VSS_USERNAME }}
          VSS_PASSWORD: ${{ secrets.VSS_PASSWORD }}
          VSS_BASE_URL_N: ${{ secrets.VSS_BASE_URL_N }}
          VSS_USERNAME_N: ${{ secrets.VSS_USERNAME_N }}
          VSS_PASSWORD_N: ${{ secrets.VSS_PASSWORD_N }}
          VSS_PREFERRED_PROFILE: ${{ secrets.VSS_PREFERRED_PROFILE }}
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
          VSS_TOKEN_TTL_HOURS: "23"
          VSS_VERCEL_REFRESH_LEAD_HOURS: "1"
        run: python scripts/push_vss_token_vercel.py
